name: Render Quarto PDF Report

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  render-pdf:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up R
        uses: r-lib/actions/setup-r@v2

      - name: Set up Quarto (with TinyTeX)
        uses: quarto-dev/quarto-actions/setup@v2
        with:
          tinytex: true

      - name: Install system libraries & fonts
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libcurl4-openssl-dev \
            libssl-dev \
            libxml2-dev \
            fonts-dejavu \
            fonts-liberation

      - name: Install R packages
        run: |
          Rscript -e 'install.packages(
            c(
              "rmarkdown",
              "knitr",
              "googlesheets4",
              "gargle",
              "jsonlite",
              "tidyverse",
              "kableExtra",
              "xml2",
              "systemfonts",
              "ragg",
              "svglite",
              "curl",
              "httr2"
            ),
            repos = "https://cloud.r-project.org"
          )'

      - name: Configure Google Sheets auth
        run: |
          echo "${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}" > service-account.json
          echo "GOOGLE_APPLICATION_CREDENTIALS=$(pwd)/service-account.json" >> $GITHUB_ENV

      - name: Render PDF
        run: |
          quarto render quarterly_macro_debt_report_ieakenya.qmd --to pdf

      - name: Move PDF to docs
        run: |
          mkdir -p docs
          mv quarterly_macro_debt_report_ieakenya.pdf docs/

      - name: Commit PDF
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add docs/quarterly_macro_debt_report_ieakenya.pdf
          git commit -m "Update latest quarterly debt report PDF" || echo "No changes to commit"
          git push