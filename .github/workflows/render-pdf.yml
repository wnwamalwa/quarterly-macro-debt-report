name: Render Quarto PDF Report

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  render-pdf:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up R
        uses: r-lib/actions/setup-r@v2

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            texlive-full \
            libcurl4-openssl-dev \
            libssl-dev \
            libxml2-dev

      - name: Install R packages
        run: |
          Rscript -e 'install.packages(c(
            "googlesheets4",
            "gargle",
            "tidyverse",
            "kableExtra"
          ), repos = "https://cloud.r-project.org")'

      - name: Render PDF
        run: |
          quarto render quarterly_macro_debt_report_ieakenya.qmd --to pdf

      - name: Publish PDF to GitHub Release (latest)
        uses: softprops/action-gh-release@v1
        with:
          tag_name: latest
          name: "Latest Quarterly Macroeconomic Debt Report"
          files: quarterly_macro_debt_report_ieakenya.pdf
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}