name: Render Quarto PDF Report

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  render-pdf:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      # 1. Checkout repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Set up R
      - name: Set up R
        uses: r-lib/actions/setup-r@v2

      # 2b. Cache R packages (MAJOR SPEED-UP)
      - name: Cache R packages
        uses: actions/cache@v4
        with:
          path: ~/.local/share/R
          key: r-${{ runner.os }}-${{ hashFiles('**/DESCRIPTION') }}
          restore-keys: |
            r-${{ runner.os }}-

      # 3. Set up Quarto (PINNED, STABLE)
      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2
        with:
          version: "1.4.553"

      # 3b. Cache TinyTeX (optional but safe)
      - name: Cache TinyTeX
        uses: actions/cache@v4
        with:
          path: ~/.TinyTeX
          key: tinytex-${{ runner.os }}

      # 3c. Install TinyTeX safely (skips if cached)
      - name: Install TinyTeX
        run: |
          quarto install tinytex

      # 4. System dependencies (graphics, fonts, PDF)
      - name: Install system libraries and fonts
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libcurl4-openssl-dev \
            libssl-dev \
            libxml2-dev \
            libfontconfig1-dev \
            libuv1-dev \
            libharfbuzz-dev \
            libfreetype6-dev \
            fonts-dejavu \
            fonts-liberation

      # 5. Install required R packages (cache-aware)
      - name: Install R packages
        run: |
          Rscript -e '
          pkgs <- c(
            "knitr","rmarkdown","dplyr","ggplot2","readr","tidyr",
            "purrr","stringr","forcats","googlesheets4","gargle",
            "jsonlite","xml2","systemfonts","ragg","svglite",
            "curl","httr2"
          )
          new <- pkgs[!pkgs %in% rownames(installed.packages())]
          if (length(new)) install.packages(new, repos = "https://cloud.r-project.org")
          '

      # 6. Write Google Sheets service account to file
      - name: Write Google Sheets service account to file
        run: |
          echo "${{ secrets.GSHEET_SERVICE_ACCOUNT }}" | base64 --decode > gsheets.json

      # 7. Render the Quarto PDF
      - name: Render PDF
        run: |
          quarto render quarterly_macro_debt_report_ieakenya.qmd --to pdf

      # 8. Move output PDF to docs/
      - name: Move PDF to docs
        run: |
          mkdir -p docs
          mv quarterly_macro_debt_report_ieakenya.pdf docs/

      # 8.5 Stash local changes (required before rebase)
      - name: Stash changes
        run: |
          git stash --include-untracked

      # 8.6 Pull latest main to avoid CI push conflicts
      - name: Pull latest main
        run: |
          git pull --rebase origin main

      # 8.7 Restore stashed changes
      - name: Apply stashed changes
        run: |
          git stash pop || echo "Nothing to pop"

      # 9. Commit PDF back to main
      - name: Commit PDF
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add docs/quarterly_macro_debt_report_ieakenya.pdf
          git commit -m "Update latest quarterly debt report PDF" || echo "No changes to commit"
          git push