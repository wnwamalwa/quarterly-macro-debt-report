name: Render Quarto PDF Report

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  render-pdf:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      # 1. Checkout repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Set up R
      - name: Set up R
        uses: r-lib/actions/setup-r@v2

      # 3. Set up Quarto
      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2
        with:
          tinytex: true   # ✅ THIS is the key line

      # 4. Install system libraries & fonts
      - name: Install system libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libcurl4-openssl-dev \
            libssl-dev \
            libxml2-dev \
            fonts-dejavu \
            fonts-liberation

      # 5. Install required R packages
      - name: Install R packages
        run: |
          Rscript -e 'install.packages(
            c(
              "rmarkdown",
              "knitr",
              "googlesheets4",
              "gargle",
              "jsonlite",
              "tidyverse",
              "kableExtra",
              "xml2",
              "systemfonts",
              "ragg",
              "svglite",
              "curl",
              "httr2"
            ),
            repos = "https://cloud.r-project.org"
          )'

      # 6. Configure Google Sheets authentication
      - name: Configure Google Sheets auth
        run: |
          echo "${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}" > service-account.json
          echo "GOOGLE_APPLICATION_CREDENTIALS=$(pwd)/service-account.json" >> $GITHUB_ENV

      # 7. Render the Quarto PDF
      - name: Render PDF
        run: |
          quarto render quarterly_macro_debt_report_ieakenya.qmd --to pdf

      # 8. Move PDF to docs folder
      - name: Move PDF to docs folder
        run: |
          mkdir -p docs
          mv quarterly_macro_debt_report_ieakenya.pdf docs/

      # 9. Commit and push PDF
      - name: Commit PDF
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add docs/quarterly_macro_debt_report_ieakenya.pdf
          git commit -m "Update latest quarterly debt report PDF" || echo "No changes to commit"
          git push