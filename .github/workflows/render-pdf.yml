name: Render Quarto PDF Report

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  render-pdf:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      # 1. Checkout repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Set up R
      - name: Set up R
        uses: r-lib/actions/setup-r@v2

      # 3. Set up Quarto with TinyTeX
      - name: Set up Quarto (with TinyTeX)
        uses: quarto-dev/quarto-actions/setup@v2
        with:
          tinytex: true

      # 4. Install system dependencies required by R graphics / PDF
      - name: Install system libraries and fonts
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libcurl4-openssl-dev \
            libssl-dev \
            libxml2-dev \
            libfontconfig1-dev \
            libuv1-dev \
            libharfbuzz-dev \
            libfreetype6-dev \
            fonts-dejavu \
            fonts-liberation

      # 5. Install R packages explicitly (NO tidyverse meta-package)
      - name: Install R packages
        run: |
          Rscript -e 'install.packages(
            c(
              "knitr",
              "rmarkdown",
              "dplyr",
              "ggplot2",
              "readr", 
              "tidyr",
              "purrr",
              "stringr",
              "forcats",
              "googlesheets4",
              "gargle",
              "jsonlite",
              "xml2",
              "systemfonts",
              "ragg",
              "svglite",
              "curl",
              "httr2"
            ),
            repos = "https://cloud.r-project.org"
          )'

      # 6. Render the Quarto PDF
      - name: Render PDF
        run: |
          quarto render quarterly_macro_debt_report_ieakenya.qmd --to pdf

      # 7. Move output PDF to docs/
      - name: Move PDF to docs
        run: |
          mkdir -p docs
          mv quarterly_macro_debt_report_ieakenya.pdf docs/

      # 8. Commit PDF back to main
      - name: Commit PDF
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add docs/quarterly_macro_debt_report_ieakenya.pdf
          git commit -m "Update latest quarterly debt report PDF" || echo "No changes to commit"
          git push
