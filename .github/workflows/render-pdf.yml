name: Render Quarto PDF Report

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  render-pdf:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      # 1. Checkout repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Set up R
      - name: Set up R
        uses: r-lib/actions/setup-r@v2

      # 3. Set up Quarto
      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      # 4. Install system dependencies (LaTeX + libs)
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            texlive-full \
            libcurl4-openssl-dev \
            libssl-dev \
            libxml2-dev

      # 5. Install required R packages
      
      - name: Install R packages
        run: |
          Rscript -e 'install.packages(c(
            "googlesheets4",
            "gargle",
            "jsonlite",
            "tidyverse",
            "kableExtra"
          ), repos = "https://cloud.r-project.org")'

      # 6. Render the Quarto PDF
      - name: Render PDF
        run: |
          quarto render quarterly_macro_debt_report_ieakenya.qmd --to pdf

      # 7. Move PDF to docs folder (for GitHub Pages)
      - name: Move PDF to docs folder
        run: |
          mkdir -p docs
          mv quarterly_macro_debt_report_ieakenya.pdf docs/

      # 8. Commit and push PDF to main branch
      - name: Commit PDF to docs
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add docs/quarterly_macro_debt_report_ieakenya.pdf
          git commit -m "Update latest quarterly debt report PDF" || echo "No changes to commit"
          git push
