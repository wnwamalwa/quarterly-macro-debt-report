name: Render Quarto PDF Report

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  render-pdf:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      # 1. Checkout repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Set up R
      - name: Set up R
        uses: r-lib/actions/setup-r@v2

      # 3. Set up Quarto
      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      # 4. Install TinyTeX (Quarto-native LaTeX)
      - name: Install TinyTeX
        run: |
          quarto install tinytex

      # 5. Install LaTeX collections needed for PDF + XeLaTeX
      - name: Install LaTeX packages
        run: |
          tlmgr install \
            collection-fontsrecommended \
            collection-latexrecommended \
            collection-latexextra \
            collection-xetex

      # 6. Install system libraries and fonts for R + XeLaTeX
      - name: Install system libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libcurl4-openssl-dev \
            libssl-dev \
            libxml2-dev \
            fonts-dejavu \
            fonts-liberation

      # 7. Install required R packages (FULL, EXPLICIT LIST)
      - name: Install R packages
        run: |
          Rscript -e 'install.packages(
            c(
              "rmarkdown",
              "knitr",
              "googlesheets4",
              "gargle",
              "jsonlite",
              "tidyverse",
              "kableExtra",
              "xml2",
              "systemfonts",
              "ragg",
              "svglite",
              "curl",
              "httr2"
            ),
            repos = "https://cloud.r-project.org"
          )'

      # 8. Configure Google Sheets authentication (service account)
      - name: Configure Google Sheets auth
        run: |
          echo "${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}" > service-account.json
          echo "GOOGLE_APPLICATION_CREDENTIALS=$(pwd)/service-account.json" >> $GITHUB_ENV

      # 9. Render the Quarto PDF (non-interactive, CI-safe)
      - name: Render PDF
        run: |
          quarto render quarterly_macro_debt_report_ieakenya.qmd --to pdf

      # 10. Move PDF to docs folder (for GitHub Pages or storage)
      - name: Move PDF to docs folder
        run: |
          mkdir -p docs
          mv quarterly_macro_debt_report_ieakenya.pdf docs/

      # 11. Commit and push the updated PDF
      - name: Commit PDF
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add docs/quarterly_macro_debt_report_ieakenya.pdf
          git commit -m "Update latest quarterly debt report PDF" || echo "No changes to commit"
          git push